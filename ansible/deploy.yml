- name: Despliegue automatizado de SpotESIfy
  hosts: all
  become: true
  vars:
    project_src: "./"
    project_dest: "/opt/spotesify"

  tasks:
    # ── 1. Instalar Docker y Docker Compose ──────────────────────────────────
    - name: Instalar dependencias previas
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - rsync
        state: present
        update_cache: true

    - name: Crear directorio para el keyring de Docker
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Descargar clave GPG oficial de Docker
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Añadir el repositorio oficial de Docker
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Instalar Docker y Docker Compose Plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    - name: Asegurar que el servicio de Docker está activado y corriendo
      systemd:
        name: docker
        state: started
        enabled: true

    # ── 2. Copiar los ficheros del proyecto ──────────────────────────────────
    - name: Sincronizar ficheros del proyecto al servidor destino
      synchronize:
        src: "{{ project_src }}"
        dest: "{{ project_dest }}"
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=node_modules"
          - "--exclude=__pycache__"

    - name: Ajustar permisos del directorio destino
      file:
        path: "{{ project_dest }}"
        owner: root
        group: root
        mode: '0755'
        recurse: true

    # ── 3. Construir las imágenes y levantar los servicios ───────────────────
    - name: Levantar SpotESIfy con Docker Compose V2
      community.docker.docker_compose_v2:
        project_src: "{{ project_dest }}"
        state: present
        build: always
      register: docker_output

    # ── 4. Verificar que la aplicación arranca correctamente ─────────────────
    - name: Esperar 15 segundos para que los servicios arranquen completamente
      pause:
        seconds: 15
      when: docker_output.changed

    - name: Verificar que el Frontend (Nginx) responde
      uri:
        url: "http://localhost/"
        method: GET
        status_code: 200
      register: verify_web
      until: verify_web.status == 200
      retries: 3
      delay: 5

    - name: Verificar que la API responde (Healthcheck)
      uri:
        url: "http://localhost/api/health"
        method: GET
        status_code: 200
      register: verify_api
      until: verify_api.status == 200
      retries: 3
      delay: 5
