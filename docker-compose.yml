# ============================================================================
# SpotESIfy — Docker Compose
# SSOO II · Escuela Superior de Informática · UCLM
# ============================================================================
# Un clon simplificado de Spotify con 4 servicios.
# Levanta con: docker compose up -d
# ============================================================================
services:

  # ── Nginx ────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: spotesify-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_healthy
    networks:
      - frontend
    restart: unless-stopped

  # ── API ──────────────────────────────────────────────────────
  api:
    build: ./api
    container_name: spotesify-api
    environment:
      - PORT=5000
      - REDIS_HOST=db
      - REDIS_PORT=6379
      - REDIS_PASSWORD=spotesify123
      - MUSIC_DIR=/data/music
    volumes:
      - ./music:/data/music
    networks:
      - frontend
      - backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  # ── DB: Redis ────────────────────────────────────────────────────────────
  db:
    image: redis:7-alpine
    container_name: spotesify-db
    command: redis-server --requirepass spotesify123
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "spotesify123", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Web: Frontend ────────────────────────────────────────────────────────
  web:
    build: ./web
    container_name: spotesify-web
    ports:
      - "3000:3000"
    networks:
      - frontend
    restart: unless-stopped

  # ── Worker ───────────────────────────────────────────────────────────────
  worker:
    build: ./worker
    container_name: spotesify-worker
    environment:
      - REDIS_HOST=db
      - REDIS_PORT=6379
      - REDIS_PASSWORD=spotesify123
      - COLLECT_INTERVAL=3000
    networks:
      - backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  redis_data:
