# SpotESIfy — Nginx Reverse Proxy
# Enruta las peticiones al frontend y al backend

upstream web_upstream {
    server web:3000;
}

upstream api_upstream {
    # Proxy al servicio backend
    server api:5000;
}

server {
    listen 80;
    server_name _;

    # Frontend
    location / {
        proxy_pass http://web_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API
    location /api/ {
        proxy_pass http://api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Necesario para uploads grandes (canciones)
        client_max_body_size 25M;
    }

    # Streaming: timeouts más largos
    location /api/stream/ {
        proxy_pass http://api_upstream;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
