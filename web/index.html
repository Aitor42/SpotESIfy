<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotESIfy — SSOO II</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">♫</span>
                <h1>SpotESIfy</h1>
            </div>
            <div class="header-right">
                <span class="status" id="status">Conectando...</span>
            </div>
        </header>

        <!-- Main content -->
        <main class="main">
            <!-- Sidebar: Playlists -->
            <aside class="sidebar">
                <h2>Playlists</h2>
                <div class="playlist-list" id="playlists">
                    <div class="loading">Cargando...</div>
                </div>
                <button class="btn btn-new-playlist" id="btn-new-playlist">
                    + Nueva Playlist
                </button>
            </aside>

            <!-- Song list -->
            <section class="content">
                <div class="content-header">
                    <h2 id="content-title">Todas las canciones</h2>
                    <button class="btn btn-upload" id="btn-upload">
                        ⬆ Subir canción
                    </button>
                </div>
                <div class="song-list" id="songs">
                    <div class="loading">Cargando canciones...</div>
                </div>
            </section>
        </main>

        <!-- Player bar -->
        <footer class="player" id="player">
            <div class="player-info">
                <div class="player-title" id="player-title">Sin reproducción</div>
                <div class="player-artist" id="player-artist">—</div>
            </div>
            <div class="player-controls">
                <button class="btn-player" id="btn-prev">⏮</button>
                <button class="btn-player btn-play" id="btn-play">▶</button>
                <button class="btn-player" id="btn-next">⏭</button>
            </div>
            <div class="player-progress">
                <span id="time-current">0:00</span>
                <input type="range" class="progress-bar" id="progress" value="0" min="0" max="100">
                <span id="time-total">0:00</span>
            </div>
            <div class="player-volume">
                <span>🔊</span>
                <input type="range" class="volume-bar" id="volume" value="80" min="0" max="100">
            </div>
        </footer>
    </div>

    <!-- Modal: Upload -->
    <div class="modal" id="modal-upload" style="display:none">
        <div class="modal-content">
            <h3>Subir canción</h3>
            <div class="form-group">
                <label>Fichero MP3</label>
                <input type="file" id="upload-file" accept=".mp3,audio/mpeg">
            </div>
            <div class="form-group">
                <label>Título</label>
                <input type="text" id="upload-title" placeholder="Nombre de la canción">
            </div>
            <div class="form-group">
                <label>Artista</label>
                <input type="text" id="upload-artist" placeholder="Artista">
            </div>
            <div class="form-group">
                <label>Género</label>
                <input type="text" id="upload-genre" placeholder="Género">
            </div>
            <div class="modal-actions">
                <button class="btn" id="upload-cancel">Cancelar</button>
                <button class="btn btn-primary" id="upload-submit">Subir</button>
            </div>
        </div>
    </div>

    <!-- Modal: New Playlist -->
    <div class="modal" id="modal-playlist" style="display:none">
        <div class="modal-content">
            <h3>Nueva Playlist</h3>
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="playlist-name" placeholder="Mi playlist">
            </div>
            <div class="modal-actions">
                <button class="btn" id="playlist-cancel">Cancelar</button>
                <button class="btn btn-primary" id="playlist-submit">Crear</button>
            </div>
        </div>
    </div>

    <!-- Audio element (hidden) -->
    <audio id="audio" preload="auto"></audio>

    <script src="app.js"></script>
</body>
</html>
